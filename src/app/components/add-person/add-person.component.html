<mat-card class="panel">
  <mat-card-header class="panel-header">
    <div>
      <mat-card-title>Dodaj osobę</mat-card-title>
      <mat-card-subtitle>Wypełnij formularz i zapisz wpis w LocalStorage.</mat-card-subtitle>
    </div>
    <a mat-stroked-button routerLink="/">Wróć</a>
  </mat-card-header>

  <mat-card-content>
    <form class="form" #personForm="ngForm" (ngSubmit)="save()">
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Imię</mat-label>
          <input matInput type="text" name="firstName" [(ngModel)]="person.firstName" required />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Nazwisko</mat-label>
          <input matInput type="text" name="familyName" [(ngModel)]="person.familyName" required />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Wiek</mat-label>
          <input matInput type="number" name="age" [(ngModel)]="person.age" min="0" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Miasto</mat-label>
          <input matInput type="text" name="city" [(ngModel)]="person.address.city" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Ulica</mat-label>
          <input matInput type="text" name="street" [(ngModel)]="person.address.street" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Kod pocztowy</mat-label>
          <input matInput type="text" name="postCode" [(ngModel)]="person.address.postCode" />
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="personForm.invalid">
          Zapisz dane
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
