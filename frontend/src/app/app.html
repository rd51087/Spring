<div class="app-shell">
  <header class="site-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">LB</div>
      <div class="brand-text">
        <span class="brand-title">Laboratorium 13</span>
        <span class="brand-subtitle">Rejestr osób</span>
      </div>
    </div>
    <nav class="site-nav" aria-label="Primary">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        Lista osób
      </a>
      <a routerLink="/add" routerLinkActive="is-active">Dodaj osobę</a>
    </nav>
  </header>

  <main class="site-main">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <span>Angular + Spring Boot (REST API).</span>
  </footer>
</div>
