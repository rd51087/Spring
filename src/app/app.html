<!-- * * * * * * * * * * * The content below * * * * * * * * * * * -->
<div class="app-shell">
  <mat-toolbar class="site-header" color="primary">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">LB</div>
      <div class="brand-text">
        <span class="brand-title">Laboratorium 12</span>
        <span class="brand-subtitle">Rejestr osób</span>
      </div>
    </div>
    <span class="spacer"></span>
    <nav class="site-nav" aria-label="Primary">
      <a mat-button routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        Lista osób
      </a>
      <a mat-stroked-button routerLink="/add" routerLinkActive="is-active">Dodaj osobę</a>
    </nav>
  </mat-toolbar>

  <main class="site-main">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <span>LocalStorage i routing w Angular.</span>
  </footer>
</div>
