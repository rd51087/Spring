<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 10 API</title>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Georgia", "Times New Roman", serif;
            background: url("https://placehold.co/100x100/FFFFFF/EFEFEF/png?text=51087");
            display: grid;
            place-items: center;
        }

        main {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #e0e0e0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 32px 40px;
            max-width: 560px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin: 0 0 12px;
            letter-spacing: 0.5px;
        }

        p {
            margin: 0;
            line-height: 1.5;
            color: #333;
        }

        a {
            color: #0b4ea2;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <h1>Lab 10 Weather API</h1>
        <p>REST endpoints are under <a href="/api">/api</a>. Use the H2 console at <a href="/h2-console">/h2-console</a>.</p>
    </main>
</body>
</html>
